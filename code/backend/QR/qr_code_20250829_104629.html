
    <!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QR Code d'accès - Gestion des Dangers</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
                padding: 20px;
            }
            .container {
                background-color: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0,0,0,0.1);
                text-align: center;
                max-width: 500px;
                width: 100%;
            }
            h1 {
                color: #333;
                margin-bottom: 20px;
            }
            img {
                max-width: 300px;
                width: 100%;
                height: auto;
                margin: 20px 0;
            }
            .urls {
                text-align: left;
                margin: 20px 0;
                padding: 15px;
                background-color: #f8f9fa;
                border-radius: 5px;
            }
            .info {
                color: #666;
                font-size: 0.9em;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🔗 Accès à l'application</h1>
            <img src="frontend_qr_20250829_104629.png" alt="QR Code d'accès">
            <div class="urls">
                <p><strong>URL:</strong> http://10.115.239.227:3000</p>
            </div>
            <p class="info">Scannez ce QR code avec votre téléphone pour accéder à l'application</p>
            <p class="info">Date de génération: 29/08/2025 10:46:29</p>
        </div>
    </body>
    </html>
